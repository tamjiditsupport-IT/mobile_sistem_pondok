name: pondok_mobile
description: "Aplikasi Mobile Sistem Pondok Pesantren"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1

  # Charts
  fl_chart: ^0.71.0

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4

  # Local Notifications
  flutter_local_notifications: ^19.2.1

  # Image Picker
  image_picker: ^1.1.2

  # URL Launcher
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
